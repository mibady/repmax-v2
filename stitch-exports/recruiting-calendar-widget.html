<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recruiting Calendar Widget</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec80",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102219",
                        "card-dark": "#1F1F22",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hide for cleaner widget look if needed */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 font-display text-white">
<!-- Widget Container -->
<!-- Fixed width 320px as requested -->
<div class="w-[320px] shrink-0 rounded-2xl bg-card-dark p-5 shadow-2xl ring-1 ring-white/5">
<!-- Header Section -->
<div class="mb-6 flex flex-col gap-3">
<h2 class="text-xl font-bold tracking-tight text-white">Recruiting Calendar</h2>
<!-- Pill: Green 'Transfer Portal Window' -->
<div class="self-start">
<div class="inline-flex items-center gap-1.5 rounded-full bg-primary/20 px-3 py-1 text-primary ring-1 ring-inset ring-primary/30">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
<span class="text-[11px] font-bold uppercase tracking-wider">Transfer Portal Window</span>
</div>
</div>
</div>
<!-- Calendar Rows -->
<div class="flex flex-col space-y-5">
<!-- Row 1: Urgent -->
<div class="group flex items-center justify-between gap-3">
<div class="flex min-w-0 items-center gap-3">
<span class="material-symbols-outlined text-[10px] text-red-500 shrink-0 filled-icon" style="font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 24;">circle</span>
<p class="truncate text-sm font-bold text-white leading-tight">Portal Window Closes</p>
</div>
<div class="shrink-0 rounded bg-red-500/10 px-1.5 py-0.5">
<p class="font-mono text-xs font-medium text-red-500">Jan 16</p>
</div>
</div>
<!-- Row 2: Upcoming -->
<div class="group flex items-center justify-between gap-3">
<div class="flex min-w-0 items-center gap-3">
<span class="material-symbols-outlined text-[10px] text-red-500 shrink-0 filled-icon" style="font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 24;">circle</span>
<p class="truncate text-sm font-medium text-gray-200 leading-tight">National Signing Day</p>
</div>
<div class="shrink-0">
<p class="font-mono text-xs font-medium text-orange-400">Feb 5</p>
</div>
</div>
<!-- Row 3: Future / Muted -->
<div class="group flex items-center justify-between gap-3">
<div class="flex min-w-0 items-center gap-3">
<span class="material-symbols-outlined text-[10px] text-gray-600 shrink-0" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;">radio_button_unchecked</span>
<p class="truncate text-sm font-normal text-gray-500 leading-tight">Spring Portal Opens</p>
</div>
<div class="shrink-0">
<p class="font-mono text-xs font-medium text-gray-500">Apr 1</p>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="mt-8 border-t border-white/5 pt-4 text-center">
<a class="group inline-flex items-center gap-1 text-xs font-medium text-[#FFD700] transition-opacity hover:opacity-80" href="#">
                View Full Calendar
                <span class="transition-transform group-hover:translate-x-0.5">→</span>
</a>
</div>
</div>
</body></html>
