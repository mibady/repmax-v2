<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RepMax Sign-Up</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#D4AF37", // Updated to the user's specific Gold
                        "primary-hover": "#B5952F",
                        "background-dark": "#050505",
                        "background-darker": "#0a0a0a",
                        "input-bg": "#1A1A1A",
                        "text-muted": "#888888",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"],
                        "sans": ["Lexend", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem", // 12px
                        "xl": "1rem",
                        "2xl": "1.5rem",
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505; 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }
    </style>
</head>
<body class="bg-background-dark text-white h-screen overflow-hidden flex flex-col lg:flex-row">
<!-- Left Panel: Branding -->
<!-- On mobile, this will appear at the top but smaller. On desktop, it takes 45% width. -->
<div class="relative w-full lg:w-[45%] h-48 lg:h-full bg-background-darker flex flex-col justify-center items-center overflow-hidden shrink-0 border-b lg:border-b-0 lg:border-r border-[#1f1f1f]">
<!-- Background Image/Texture -->
<div class="absolute inset-0 z-0 opacity-20 mix-blend-overlay bg-cover bg-center" data-alt="Silhouette of a football player in a stadium tunnel" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCfGweFF-p4eM5vQqMeMZyxxfSV_yTPMKPuc9hSbc_eIRwZdLeB5tViJ0secPCv3jftK-NIps8Z15nE7mKAJHMH-DP0R9sJQdMx3vh-06ndHHC7op1nCVo1JlKLlIhVfPDkJwRKeL_izOj0shEUP0kPmwiqlW9PjTIzM3bQYvBEbRYMv52r6fkH--G4eBLlWqiTLL2txp5-pHnLzIlRpXyGMyS508Hw1hlX_rmwhS9Zinsb6zDSDcPLYsAkL90N-D1Du3kFdqX0ZOQ');">
</div>
<!-- Gradient Overlay for better text readability -->
<div class="absolute inset-0 z-10 bg-gradient-to-t from-background-darker via-transparent to-background-darker/50 lg:bg-gradient-to-b lg:from-background-darker/80 lg:via-background-darker/40 lg:to-background-darker"></div>
<!-- Content -->
<div class="relative z-20 flex flex-col items-center justify-center p-8 text-center">
<h1 class="text-5xl lg:text-7xl font-black tracking-tighter text-primary mb-4 drop-shadow-lg">
                REPMAX
            </h1>
<h2 class="text-white/90 text-lg lg:text-2xl font-light tracking-wide uppercase">
                Every Rep Counts.
            </h2>
</div>
</div>
<!-- Right Panel: Form -->
<div class="flex-1 w-full lg:w-[55%] h-full bg-background-dark overflow-y-auto relative flex flex-col">
<div class="flex-1 flex flex-col justify-center items-center p-6 lg:p-12 xl:p-24 w-full">
<div class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Form Header -->
<div class="space-y-2 text-center lg:text-left">
<h2 class="text-3xl lg:text-4xl font-black tracking-tight text-white">Join RepMax</h2>
<p class="text-text-muted text-base lg:text-lg">Unlock elite recruiting intelligence today.</p>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-5">
<!-- Full Name -->
<div class="space-y-2">
<label class="text-sm font-medium text-gray-300 ml-1" for="fullname">Full Name</label>
<input class="w-full h-12 px-4 rounded-lg bg-input-bg border border-transparent text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" id="fullname" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email -->
<div class="space-y-2">
<label class="text-sm font-medium text-gray-300 ml-1" for="email">Email Address</label>
<input class="w-full h-12 px-4 rounded-lg bg-input-bg border border-transparent text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="text-sm font-medium text-gray-300 ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 pr-12 rounded-lg bg-input-bg border border-transparent text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all duration-200" id="password" placeholder="Create a password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full h-12 bg-primary hover:bg-primary-hover text-[#0a0a0a] font-bold text-base rounded-lg transition-all transform active:scale-[0.98] shadow-[0_0_15px_rgba(212,175,55,0.2)] hover:shadow-[0_0_20px_rgba(212,175,55,0.4)]" type="button">
                        Create Account
                    </button>
</form>
<!-- Divider -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-gray-800"></div>
<span class="flex-shrink-0 mx-4 text-gray-500 text-sm">or continue with</span>
<div class="flex-grow border-t border-gray-800"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-12 bg-input-bg hover:bg-[#252525] border border-gray-800 hover:border-gray-600 rounded-lg transition-all duration-200 group">
<svg class="w-5 h-5 text-white group-hover:text-white" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-gray-300 group-hover:text-white">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-12 bg-input-bg hover:bg-[#252525] border border-gray-800 hover:border-gray-600 rounded-lg transition-all duration-200 group">
<svg class="w-5 h-5 text-white group-hover:text-white" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.88-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.78 1.18-.19 2.31-.89 3.51-.84 1.54.06 2.7.79 3.44 1.92-3.04 1.8-2.5 5.27.64 6.64-.67 1.72-1.6 3.49-2.67 4.47zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"></path>
</svg>
<span class="text-sm font-medium text-gray-300 group-hover:text-white">Apple</span>
</button>
</div>
<!-- Footer -->
<div class="text-center space-y-4 pt-2">
<p class="text-gray-400 text-sm">
                        Already have an account? 
                        <a class="text-primary hover:text-primary-hover font-semibold transition-colors" href="#">Sign In</a>
</p>
<p class="text-xs text-gray-600 max-w-xs mx-auto leading-relaxed">
                        By creating an account, you agree to our 
                        <a class="text-primary/70 hover:text-primary underline decoration-primary/30" href="#">Terms of Service</a> 
                        and 
                        <a class="text-primary/70 hover:text-primary underline decoration-primary/30" href="#">Privacy Policy</a>.
                    </p>
</div>
</div>
</div>
</div>
</body></html>
