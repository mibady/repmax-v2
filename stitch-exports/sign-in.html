<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RepMax Sign-In</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d4af35",
                        "background-light": "#f8f7f6",
                        "background-dark": "#201d12",
                        "dark-panel-l": "#0a0a0a",
                        "dark-panel-r": "#050505",
                        "input-bg": "#1A1A1A",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased h-screen w-full overflow-hidden flex flex-col md:flex-row">
<!-- Left Panel: Brand & Atmosphere -->
<div class="relative w-full md:w-[45%] h-32 md:h-full bg-dark-panel-l flex flex-col items-center justify-center overflow-hidden shrink-0">
<!-- Ambient Background Effects -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/20 via-transparent to-transparent opacity-60 pointer-events-none"></div>
<!-- Football Silhouette/Texture Background -->
<div class="absolute inset-0 opacity-10 mix-blend-overlay bg-cover bg-center pointer-events-none" data-alt="American football stadium lights at night" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBe3bnRu4i1GuajJerKcX-WjKibtoRr_5d8l_aZiE3YJka0RGq70SZfy0yP7P7DfZN81x0n2tPd68bCSBCcgEMXq4X-qVAcIGvJ1VDPjgfh9KbY692lZWzheUIJL424bHfHlkOStzFemoibJBCDOaHAX4FR7mldet9Yj5ljFpMvA6otTD3deDvLNjpaOGc2UO6qJKe0N0LO-9yLZQ-jY0hekRZXOfcXhqVJdL2JL4iAQBOHT7XUz8qTiTrzsAGPCzUxmXu8TxfYa9o');">
</div>
<!-- Brand Content -->
<div class="relative z-10 flex flex-col items-center text-center p-8">
<h1 class="text-primary tracking-tight text-5xl md:text-6xl font-black leading-tight mb-2 drop-shadow-lg">
                REPMAX
            </h1>
<p class="text-white text-lg md:text-xl font-light italic opacity-90 tracking-wide">
                Every Rep Counts.
            </p>
<!-- Decorative Element -->
<div class="mt-8 w-16 h-1 bg-primary rounded-full opacity-60"></div>
</div>
<!-- Subtle overlay pattern -->
<div class="absolute bottom-0 w-full h-1/2 bg-gradient-to-t from-black/80 to-transparent pointer-events-none"></div>
</div>
<!-- Right Panel: Login Form -->
<div class="w-full md:w-[55%] h-full bg-dark-panel-r flex flex-col justify-center items-center overflow-y-auto relative">
<div class="w-full max-w-[520px] px-6 py-12 md:px-12 flex flex-col">
<!-- Header Section -->
<div class="mb-10 text-center md:text-left">
<h2 class="text-white text-3xl md:text-4xl font-black leading-tight mb-3 tracking-tight">
                    Welcome Back
                </h2>
<p class="text-gray-400 text-base font-normal">
                    Enter your details to access recruiting intelligence.
                </p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-gray-300 text-sm font-medium ml-1" for="email">Email Address</label>
<input class="w-full h-14 bg-input-bg text-white placeholder-gray-500 rounded-xl border border-transparent focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none px-4 transition-all duration-200" id="email" placeholder="coach@university.edu" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-gray-300 text-sm font-medium" for="password">Password</label>
<a class="text-primary text-sm hover:underline hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative flex items-center">
<input class="w-full h-14 bg-input-bg text-white placeholder-gray-500 rounded-xl border border-transparent focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none pl-4 pr-12 transition-all duration-200" id="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-gray-500 hover:text-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="mt-2 w-full h-14 bg-primary hover:bg-yellow-600 text-black font-bold text-lg rounded-xl transition-all duration-200 shadow-[0_0_15px_rgba(212,175,53,0.2)] hover:shadow-[0_0_20px_rgba(212,175,53,0.4)]" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative flex py-8 items-center">
<div class="flex-grow border-t border-gray-800"></div>
<span class="flex-shrink-0 mx-4 text-gray-500 text-sm">or continue with</span>
<div class="flex-grow border-t border-gray-800"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 h-12 bg-input-bg hover:bg-[#252525] border border-gray-800 hover:border-gray-700 rounded-xl transition-all duration-200 group" type="button">
<svg class="w-5 h-5 text-white group-hover:scale-110 transition-transform" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-white text-sm font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-3 h-12 bg-input-bg hover:bg-[#252525] border border-gray-800 hover:border-gray-700 rounded-xl transition-all duration-200 group" type="button">
<svg aria-hidden="true" class="w-5 h-5 text-white group-hover:scale-110 transition-transform" fill="currentColor" viewbox="0 0 24 24">
<path d="M13.2 2.6C12.4 3.5 12 4.7 12.2 6c1.3-.1 2.5-.7 3.3-1.6.8-.9 1.3-2.1 1.1-3.3-1.2 0-2.4.6-3.4 1.5ZM12.9 6.8c-1.7 0-3-.9-3.7-.9-.8 0-2 .9-3.3.9-1.7 0-3.3-1.7-4.4-4.1C-.2 8.7.6 14.8 3.1 18.4c1.2 1.7 2.6 3.6 4.4 3.6 1.7 0 2.4-1.1 4.5-1.1 2.1 0 2.7 1.1 4.5 1.1 1.8 0 3-1.6 4.2-3.4 1.3-1.9 1.9-3.7 1.9-3.8-.1 0-3.7-1.4-3.7-5.6 0-3.5 2.9-5.1 3-5.2-1.7-2.4-4.3-2.7-5.2-2.7-.9 0-2.2.4-3.8.4Z"></path>
</svg>
<span class="text-white text-sm font-medium">Apple</span>
</button>
</div>
<!-- Footer -->
<div class="mt-10 text-center">
<p class="text-gray-400 text-sm">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline hover:text-primary/80 transition-colors ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</div>
</body></html>
