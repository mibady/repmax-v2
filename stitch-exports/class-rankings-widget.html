        darkMode: "class",
        theme: {
          extend: {
            colors: {

            fontFamily: {
              "display": ["Inter", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"],

            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<style>

        ::-webkit-scrollbar {
            width: 4px;

        }
        ::-webkit-scrollbar-thumb {
            background: rgba(223, 178, 32, 0.3);

        }
        .material-symbols-outlined {
