<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mobile Share Bottom Sheet</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#cdab3c",
                        "gold": "#D4AF37", 
                        "sheet-bg": "#1A1A1A",
                        "background-light": "#f8f7f6",
                        "background-dark": "#050505", // Updated based on prompt context
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-dark font-display text-white overflow-hidden">
<!-- Main Container simulating the App Viewport -->
<div class="relative flex h-screen w-full flex-col items-center justify-center overflow-hidden bg-[#050505]">
<!-- Background Image simulating app content (blurred) -->
<div class="absolute inset-0 bg-cover bg-center opacity-40 blur-sm pointer-events-none" data-alt="Blurred gym background showing weights and equipment" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBIoMjy8dW1aZkOwOqIohxawjclRdGv6UIBM0xQVjYjCz1kdkWg-ybd1UnLIsHTMqWSXCuoqFHmEuuvDCSBM56tlEwRimY-cTRkOfogdp2W57TfeGny2-SXPAVGna2YizoV2mJ94S-cy20pIJKVVbEcmQeY6EF9ZonhNAGQ8SQNr-GsAbpXDQ-63t8O6lx-ftfDmDhwyJ8tU0QgIEKKlIE0T5V_3o1IvRFQIcbws33Mjk1rQ-fYt9VXPFgdI3dIN5iutgCQAvLRC6I');"></div>
<!-- Dimmed Overlay -->
<div class="absolute inset-0 bg-black/70 z-10"></div>
<!-- Bottom Sheet Container -->
<!-- Anchored to bottom on mobile logic, centered here for presentation -->
<div class="z-20 w-full max-w-[390px] flex flex-col justify-end h-full sm:h-auto sm:justify-center absolute bottom-0 sm:relative sm:bottom-auto">
<div class="w-full bg-[#1A1A1A] rounded-t-[16px] sm:rounded-[16px] shadow-2xl overflow-hidden flex flex-col items-center pb-8 animate-slide-up">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-2">
<div class="h-1.5 w-12 bg-white/20 rounded-full"></div>
</div>
<!-- Header -->
<div class="w-full px-6 pt-2 pb-6 text-center">
<h2 class="text-white text-[24px] font-bold leading-tight mb-2">Share Your Card</h2>
<p class="text-[#A1A1AA] text-sm font-normal">Invite friends to track your progress.</p>
</div>
<!-- Link Input Section -->
<div class="w-full px-6 mb-8">
<div class="flex items-center justify-between w-full h-[52px] rounded-lg border border-[#D4AF37] bg-[#222] overflow-hidden px-1">
<input class="flex-1 bg-transparent border-none text-white font-mono text-sm px-3 focus:ring-0 truncate" readonly="" type="text" value="repmax.com/card/RM-7X4K2P"/>
<button class="h-8 px-4 bg-[#D4AF37] hover:bg-[#b8952b] text-black text-xs font-bold uppercase tracking-wide rounded flex items-center justify-center transition-colors">
                            Copy
                        </button>
</div>
</div>
<!-- Social Share Row -->
<div class="w-full px-6 mb-8">
<div class="flex justify-between items-center gap-2">
<!-- Message -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-[#333] flex items-center justify-center group-hover:bg-[#444] transition-colors">
<span class="material-symbols-outlined text-white text-[24px]">sms</span>
</div>
<span class="text-[10px] text-[#A1A1AA]">Message</span>
</button>
<!-- Email -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-[#333] flex items-center justify-center group-hover:bg-[#444] transition-colors">
<span class="material-symbols-outlined text-white text-[24px]">mail</span>
</div>
<span class="text-[10px] text-[#A1A1AA]">Email</span>
</button>
<!-- X (Using generic close/X icon as requested for Material Symbols) -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-[#333] flex items-center justify-center group-hover:bg-[#444] transition-colors">
<span class="material-symbols-outlined text-white text-[24px]">close</span>
</div>
<span class="text-[10px] text-[#A1A1AA]">X</span>
</button>
<!-- Instagram -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-[#333] flex items-center justify-center group-hover:bg-[#444] transition-colors">
<span class="material-symbols-outlined text-white text-[24px]">photo_camera</span>
</div>
<span class="text-[10px] text-[#A1A1AA]">Stories</span>
</button>
<!-- WhatsApp -->
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-full bg-[#333] flex items-center justify-center group-hover:bg-[#444] transition-colors">
<span class="material-symbols-outlined text-white text-[24px]">chat</span>
</div>
<span class="text-[10px] text-[#A1A1AA]">WhatsApp</span>
</button>
</div>
</div>
<!-- Divider -->
<div class="w-full h-px bg-white/10 mb-8"></div>
<!-- QR Code Section -->
<div class="flex flex-col items-center gap-4 w-full px-6 mb-8">
<div class="relative w-[200px] h-[200px] bg-white p-2 rounded-lg flex items-center justify-center shadow-lg">
<!-- QR Code Image -->
<img alt="QR Code for companion card" class="w-full h-full object-contain mix-blend-multiply" data-alt="QR Code pattern linking to the user's companion card" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCw5wJIQfiHQ-hMSeam34qyEC2CYYMgS3TenIWgbawe1aZ5Jx6P3HkuSF_k3MN7jr2Wc_XDsWWmZjS5AjfEp-Yav3o20RCCi9iR4yCmmdxlAeRScExywzhP9JWXba94sZc89D3nYR26Wpo0_-NJfu4COf1Z31_SQgHyDDPxHpAtZ7z_aai_gTINRZKrJNFW8Vwgjo5q5C60LGvXWdp42kgT3lBeqnBGUtZD_EaAF_79e0Hn6Qj9CszemJ_Ve0QFezuTmvBsp1p95zg"/>
<!-- Center Logo Overlay -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-[#1A1A1A] p-1.5 rounded-full border-2 border-white">
<div class="bg-[#D4AF37] text-[#1A1A1A] w-8 h-8 rounded-full flex items-center justify-center font-black text-[8px] tracking-tighter leading-none">
                                    REP<br/>MAX
                                </div>
</div>
</div>
</div>
<a class="text-[#D4AF37] text-sm font-medium hover:text-[#b8952b] transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[18px]">download</span>
                        Download QR Code
                    </a>
</div>
<!-- Footer Stats -->
<div class="w-full text-center">
<p class="text-[#52525B] text-xs font-normal">Shared 12 times this month</p>
</div>
</div>
</div>
</div>
</body></html>
